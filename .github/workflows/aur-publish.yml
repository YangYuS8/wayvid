name: Publish AUR lwe-git

on:
  push:
    branches:
      - main

concurrency:
  group: aur-lwe-git-main
  cancel-in-progress: false

jobs:
  publish-aur:
    runs-on: ubuntu-latest
    container:
      image: archlinux:base-devel

    steps:
      - name: Install runtime dependencies
        run: pacman -Syu --noconfirm git openssh

      - name: Checkout source
        uses: actions/checkout@v4

      - name: Prepare non-root makepkg user
        run: |
          useradd --create-home --shell /bin/bash aurbuilder
          chown -R aurbuilder:aurbuilder "$GITHUB_WORKSPACE"

      - name: Regenerate .SRCINFO
        run: |
          su -s /bin/bash aurbuilder -c 'cd "$GITHUB_WORKSPACE/packaging/aur/lwe-git" && makepkg --printsrcinfo > .SRCINFO'

      - name: Setup SSH configuration
        env:
          AUR_SSH_PRIVATE_KEY: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
        shell: bash
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          cat > ~/.ssh/known_hosts <<'EOF'
          aur.archlinux.org ssh-rsa 
          aur.archlinux.org ecdsa-sha2-nistp256 AAAAE2VjZHNhLXNoYTItbmlzdHAyNTYAAAAIbmlzdHAyNTYAAABBBLMiLrP8pVi5BFX2i3vepSUnpedeiewE5XptnUnau+ZoeUOPkpoCgZZuYfpaIQfhhJJI5qgnjJmr4hyJbe/zxow=
          aur.archlinux.org ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIEuBKrPzbawxA/k2g6NcyV5jmqwJ2s+zpgZGZ7tpLIcN
          EOF
          test -s ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

          eval "$(ssh-agent -s)"
          trap 'ssh-agent -k' EXIT
          printf "%s\n" "$AUR_SSH_PRIVATE_KEY" | ssh-add -

          SSH_OPTS="-o StrictHostKeyChecking=yes -o UserKnownHostsFile=$HOME/.ssh/known_hosts -o GlobalKnownHostsFile=/dev/null"

          set +e
          ssh $SSH_OPTS -T aur@aur.archlinux.org
          ssh_rc=$?
          set -e
          if [ "$ssh_rc" -ne 0 ] && [ "$ssh_rc" -ne 1 ]; then
            echo "AUR SSH connectivity check failed with code ${ssh_rc}"
            exit "$ssh_rc"
          fi

          GIT_SSH_COMMAND="ssh $SSH_OPTS" git clone "ssh://aur@aur.archlinux.org/lwe-git.git" aur-repo

          cp packaging/aur/lwe-git/PKGBUILD aur-repo/PKGBUILD
          cp packaging/aur/lwe-git/.SRCINFO aur-repo/.SRCINFO

          cd aur-repo
          git add PKGBUILD .SRCINFO
          if git diff --cached --quiet; then
            echo "No AUR metadata changes to publish"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "chore: update lwe-git to ${GITHUB_SHA:0:7}"
          GIT_SSH_COMMAND="ssh $SSH_OPTS" git push origin HEAD:master
