name: Release Stable

on:
  push:
    tags:
      - "v*"

concurrency:
  group: release-stable-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-release:
    runs-on: ubuntu-latest
    container:
      image: archlinux:base-devel

    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Install dependencies
        run: pacman -Syu --noconfirm git openssh nodejs pnpm rustup base-devel appmenu-gtk-module libappindicator-gtk3 librsvg desktop-file-utils webkit2gtk

      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve version
        id: version
        shell: bash
        run: |
          tag_version="${GITHUB_REF_NAME#v}"
          cargo_version="$(sed -n 's/^version = "\([^"]\+\)"$/\1/p' Cargo.toml | head -n 1)"
          if [ "$tag_version" != "$cargo_version" ]; then
            echo "Tag version ($tag_version) does not match Cargo workspace version ($cargo_version)"
            exit 1
          fi
          echo "version=$tag_version" >> "$GITHUB_OUTPUT"

      - name: Build bundles
        run: cargo tauri build -b "deb,rpm,appimage"

      - name: Collect artifacts
        shell: bash
        run: |
          mkdir -p dist
          cp -v src-tauri/target/release/bundle/deb/*.deb dist/
          cp -v src-tauri/target/release/bundle/rpm/*.rpm dist/
          cp -v src-tauri/target/release/bundle/appimage/*.AppImage dist/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: stable-bundles
          path: dist/*

  publish-release:
    runs-on: ubuntu-latest
    needs: build-release
    permissions:
      contents: write

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: stable-bundles
          path: dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: LWE v${{ needs.build-release.outputs.version }}
          files: dist/*

  publish-aur-stable:
    runs-on: ubuntu-latest
    needs: build-release
    container:
      image: archlinux:base-devel

    steps:
      - name: Install runtime dependencies
        run: pacman -Syu --noconfirm git openssh

      - name: Checkout source
        uses: actions/checkout@v4

      - name: Prepare non-root makepkg user
        run: |
          useradd --create-home --shell /bin/bash aurbuilder
          chown -R aurbuilder:aurbuilder "$GITHUB_WORKSPACE"

      - name: Sync AUR stable package version to Cargo
        shell: bash
        run: |
          cargo_version="$(sed -n 's/^version = "\([^"]\+\)"$/\1/p' Cargo.toml | head -n 1)"
          sed -i "s/^pkgver=.*/pkgver=${cargo_version}/" packaging/aur/lwe/PKGBUILD
          su -s /bin/bash aurbuilder -c 'cd "$GITHUB_WORKSPACE/packaging/aur/lwe" && makepkg --printsrcinfo > .SRCINFO'

      - name: Setup SSH configuration
        env:
          AUR_SSH_PRIVATE_KEY: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
        shell: bash
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          cat > ~/.ssh/known_hosts <<'EOF'
          aur.archlinux.org ssh-rsa 
          aur.archlinux.org ecdsa-sha2-nistp256 AAAAE2VjZHNhLXNoYTItbmlzdHAyNTYAAAAIbmlzdHAyNTYAAABBBLMiLrP8pVi5BFX2i3vepSUnpedeiewE5XptnUnau+ZoeUOPkpoCgZZuYfpaIQfhhJJI5qgnjJmr4hyJbe/zxow=
          aur.archlinux.org ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIEuBKrPzbawxA/k2g6NcyV5jmqwJ2s+zpgZGZ7tpLIcN
          EOF
          chmod 644 ~/.ssh/known_hosts

          eval "$(ssh-agent -s)"
          trap 'ssh-agent -k' EXIT
          printf "%s\n" "$AUR_SSH_PRIVATE_KEY" | ssh-add -
          SSH_OPTS="-o StrictHostKeyChecking=yes -o UserKnownHostsFile=$HOME/.ssh/known_hosts -o GlobalKnownHostsFile=/dev/null"

          set +e
          ssh $SSH_OPTS -T aur@aur.archlinux.org
          ssh_rc=$?
          set -e
          if [ "$ssh_rc" -ne 0 ] && [ "$ssh_rc" -ne 1 ]; then
            echo "AUR SSH connectivity check failed with code ${ssh_rc}"
            exit "$ssh_rc"
          fi

          GIT_SSH_COMMAND="ssh $SSH_OPTS" git clone "ssh://aur@aur.archlinux.org/lwe.git" aur-repo
          cp packaging/aur/lwe/PKGBUILD aur-repo/PKGBUILD
          cp packaging/aur/lwe/.SRCINFO aur-repo/.SRCINFO

          cd aur-repo
          git add PKGBUILD .SRCINFO
          if git diff --cached --quiet; then
            echo "No AUR stable metadata changes to publish"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "chore: release lwe ${GITHUB_REF_NAME#v}"
          GIT_SSH_COMMAND="ssh $SSH_OPTS" git push origin HEAD:master
