name: Release Stable

on:
  push:
    tags:
      - "v*"

concurrency:
  group: release-stable-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-release:
    runs-on: ubuntu-latest
    container:
      image: archlinux:base-devel

    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Install dependencies
        run: pacman -Syu --noconfirm git openssh nodejs pnpm rustup base-devel cargo-tauri appmenu-gtk-module libappindicator-gtk3 librsvg desktop-file-utils webkit2gtk

      - name: Configure Rust toolchain
        shell: bash
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Cache Cargo registry and target
        uses: actions/cache@v4
        with:
          path: |
            /root/.cargo/registry
            /root/.cargo/git
            target
          key: ${{ runner.os }}-cargo-stable-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-stable-
            ${{ runner.os }}-cargo-

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: /root/.local/share/pnpm/store
          key: ${{ runner.os }}-pnpm-stable-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-stable-
            ${{ runner.os }}-pnpm-

      - name: Resolve version
        id: version
        shell: bash
        run: |
          tag_version="${GITHUB_REF_NAME#v}"
          cargo_version="$(sed -n 's/^version = "\([^"]\+\)"$/\1/p' Cargo.toml | head -n 1)"
          if [ "$tag_version" != "$cargo_version" ]; then
            echo "Tag version ($tag_version) does not match Cargo workspace version ($cargo_version)"
            exit 1
          fi
          echo "version=$tag_version" >> "$GITHUB_OUTPUT"

      - name: Build bundles
        run: cargo tauri build -b "deb,rpm,appimage"

      - name: Collect artifacts
        shell: bash
        run: |
          mkdir -p dist
          cp -v src-tauri/target/release/bundle/deb/*.deb dist/
          cp -v src-tauri/target/release/bundle/rpm/*.rpm dist/
          cp -v src-tauri/target/release/bundle/appimage/*.AppImage dist/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: stable-bundles
          path: dist/*

  publish-release:
    runs-on: ubuntu-latest
    needs: build-release
    permissions:
      contents: write

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: stable-bundles
          path: dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: LWE v${{ needs.build-release.outputs.version }}
          files: dist/*

  publish-aur-stable:
    runs-on: ubuntu-latest
    needs: build-release
    container:
      image: archlinux:base-devel

    steps:
      - name: Install runtime dependencies
        run: pacman -Syu --noconfirm git openssh

      - name: Checkout source
        uses: actions/checkout@v4

      - name: Prepare non-root makepkg user
        run: |
          useradd --create-home --shell /bin/bash aurbuilder
          chown -R aurbuilder:aurbuilder "$GITHUB_WORKSPACE"

      - name: Sync AUR stable package version to Cargo
        shell: bash
        run: |
          cargo_version="$(sed -n 's/^version = "\([^"]\+\)"$/\1/p' Cargo.toml | head -n 1)"
          sed -i "s/^pkgver=.*/pkgver=${cargo_version}/" packaging/aur/lwe/PKGBUILD
          su -s /bin/bash aurbuilder -c 'cd "$GITHUB_WORKSPACE/packaging/aur/lwe" && makepkg --printsrcinfo > .SRCINFO'

      - name: Setup SSH configuration
        env:
          AUR_SSH_PRIVATE_KEY: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
        shell: bash
        run: |
          scripts/publish-aur-package.sh \
            packaging/aur/lwe \
            lwe \
            "chore: release lwe ${GITHUB_REF_NAME#v}"
