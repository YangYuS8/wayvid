name: Release Stable

on:
  push:
    tags:
      - "v*"

concurrency:
  group: release-stable-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-release:
    runs-on: ubuntu-latest

    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install system dependencies
        run: |
          if command -v apt-get >/dev/null 2>&1; then
            if command -v sudo >/dev/null 2>&1; then SUDO=sudo; else SUDO=; fi
            $SUDO apt-get update
            $SUDO apt-get install -y \
              build-essential \
              pkg-config \
              libssl-dev \
              libmpv-dev \
              libgtk-3-dev \
              libayatana-appindicator3-dev \
              librsvg2-dev \
              libsoup-3.0-dev \
              libwebkit2gtk-4.1-dev \
              patchelf
          elif command -v pacman >/dev/null 2>&1; then
            pacman -Syu --noconfirm \
              base-devel \
              pkgconf \
              openssl \
              mpv \
              gtk3 \
              libayatana-appindicator \
              librsvg \
              libsoup3 \
              webkit2gtk-4.1 \
              patchelf
          else
            echo "Unsupported package manager (need apt-get or pacman)"
            exit 1
          fi

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Enable pnpm via Corepack
        run: |
          corepack enable
          corepack prepare pnpm@10 --activate
          pnpm --version

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Tauri CLI binary
        uses: actions/cache@v4
        with:
          path: /home/runner/.cargo/bin/tauri
          key: ${{ runner.os }}-tauri-cli-v2

      - name: Install Tauri CLI
        run: |
          if ! command -v tauri >/dev/null 2>&1; then
            cargo install tauri-cli --locked
          fi

      - name: Cache Rust artifacts
        uses: swatinem/rust-cache@v2

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Resolve version
        id: version
        shell: bash
        run: |
          tag_version="${GITHUB_REF_NAME#v}"
          cargo_version="$(sed -n 's/^version = "\([^"]\+\)"$/\1/p' Cargo.toml | head -n 1)"
          if [ "$tag_version" != "$cargo_version" ]; then
            echo "Tag version ($tag_version) does not match Cargo workspace version ($cargo_version)"
            exit 1
          fi
          echo "version=$tag_version" >> "$GITHUB_OUTPUT"

      - name: Build bundles
        run: cargo tauri build -b "deb,rpm,appimage"

      - name: Collect artifacts
        shell: bash
        run: |
          shopt -s nullglob
          mkdir -p dist
          deb_files=(target/release/bundle/deb/*.deb src-tauri/target/release/bundle/deb/*.deb)
          rpm_files=(target/release/bundle/rpm/*.rpm src-tauri/target/release/bundle/rpm/*.rpm)
          appimage_files=(target/release/bundle/appimage/*.AppImage src-tauri/target/release/bundle/appimage/*.AppImage)

          if [ "${#deb_files[@]}" -eq 0 ] || [ "${#rpm_files[@]}" -eq 0 ] || [ "${#appimage_files[@]}" -eq 0 ]; then
            echo "Expected bundle artifacts not found"
            echo "deb: ${#deb_files[@]}, rpm: ${#rpm_files[@]}, appimage: ${#appimage_files[@]}"
            exit 1
          fi

          cp -v "${deb_files[@]}" dist/
          cp -v "${rpm_files[@]}" dist/
          cp -v "${appimage_files[@]}" dist/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: stable-bundles
          path: dist/*

  publish-release:
    runs-on: ubuntu-latest
    needs: build-release
    permissions:
      contents: write

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: stable-bundles
          path: dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: LWE v${{ needs.build-release.outputs.version }}
          files: dist/*

  publish-aur-stable:
    runs-on: ubuntu-latest
    needs: build-release

    steps:
      - name: Install runtime dependencies
        run: |
          if command -v apt-get >/dev/null 2>&1; then
            if command -v sudo >/dev/null 2>&1; then SUDO=sudo; else SUDO=; fi
            $SUDO apt-get update
            $SUDO apt-get install -y git openssh-client
          elif command -v pacman >/dev/null 2>&1; then
            pacman -Syu --noconfirm git openssh
          else
            echo "Unsupported package manager (need apt-get or pacman)"
            exit 1
          fi

      - name: Checkout source
        uses: actions/checkout@v4

      - name: Prepare non-root makepkg user
        run: |
          useradd --create-home --shell /bin/bash aurbuilder
          chown -R aurbuilder:aurbuilder "$GITHUB_WORKSPACE"

      - name: Sync AUR stable package version to Cargo
        shell: bash
        run: |
          cargo_version="$(sed -n 's/^version = "\([^"]\+\)"$/\1/p' Cargo.toml | head -n 1)"
          sed -i "s/^pkgver=.*/pkgver=${cargo_version}/" packaging/aur/lwe/PKGBUILD
          su -s /bin/bash aurbuilder -c 'cd "$GITHUB_WORKSPACE/packaging/aur/lwe" && makepkg --printsrcinfo > .SRCINFO'

      - name: Setup SSH configuration
        env:
          AUR_SSH_PRIVATE_KEY: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
        shell: bash
        run: |
          scripts/publish-aur-package.sh \
            packaging/aur/lwe \
            lwe \
            "chore: release lwe ${GITHUB_REF_NAME#v}"
