name: Documentation

on:
  push:
    branches:
      - main
    paths:
      - 'docs/**'
      - 'examples/**'
      - '.github/workflows/docs.yml'
  pull_request:
    paths:
      - 'docs/**'
      - 'examples/**'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

jobs:
  docs-consistency:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify reset-era docs inventory
        run: |
          test -f docs/product/overview.md
          test -f docs/product/roadmap.md
          test -f docs/product/repository-reset.md
          test -f docs/archive/legacy-wayvid-summary.md
          test ! -e docs/src
          test ! -e docs/po
          test ! -e docs/book

      - name: Smoke test reset-era docs helpers
        run: |
          python3 -m py_compile docs/translate_po.py
          python3 docs/translate_po.py

      - name: Write summary
        run: |
          echo '## Docs reset consistency' >> "$GITHUB_STEP_SUMMARY"
          echo '' >> "$GITHUB_STEP_SUMMARY"
          echo '- reset-era docs inventory present' >> "$GITHUB_STEP_SUMMARY"
          echo '- retired docs trees absent' >> "$GITHUB_STEP_SUMMARY"
          echo '- reset-era docs helpers execute cleanly' >> "$GITHUB_STEP_SUMMARY"
